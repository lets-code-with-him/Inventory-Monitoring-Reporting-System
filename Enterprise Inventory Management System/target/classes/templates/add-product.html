<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/logs.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Add Product</h2>
    <form th:action="@{/products/save}" method="post">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" name="category" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" name="quantity" class="form-control" min="0" required/>
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" step="0.01" name="price" class="form-control" min="0" required/>
        </div>

        <div class="mb-3">
            <label>Reorder Level</label>
            <input type="number" name="reorderLevel" class="form-control" min="0" required/>
        </div>

        <button class="btn btn-primary">Save</button>
        <a href="/products" class="btn btn-secondary">Cancel</a>

    </form>


</div>

</body>
</html>

</div>

</body>
</html>
