<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/products.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-3">Products</h2>

    <div class="top-bar">

        <form th:action="@{/products/search}" method="get" class="search-form">
            <input type="text"
                   name="keyword"
                   class="form-control search-box"
                   placeholder="Search product...">

            <button class="btn btn-primary">Search</button>
        </form>

        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/products/add}" class="btn btn-success">
                Add Product
            </a>
        </div>

    </div>


    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Price</th>
            <th sec:authorize="hasRole('ADMIN')">Stock Update</th>
            <th sec:authorize="hasRole('ADMIN')">Delete</th>

        </tr>
        </thead>

        <tbody>
        <tr th:each="p,stat : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${p.quantity}"></td>

            <!-- Price formatting -->
            <td th:text="${#numbers.formatDecimal(p.price,1,2)}"></td>

            <!--ADMIN ONLY STOCK UPDATE-->
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/update/{id}(id=${p.id},quantity=1,type='ADD')}"
                   class="btn btn-sm btn-primary me-1">+1</a>

                <a th:href="@{/products/update/{id}(id=${p.id},quantity=1,type='REMOVE')}"
                   class="btn btn-sm btn-danger">-1</a>

                <a th:href="@{/products/edit/{id}(id=${p.id})}"
                   class="btn btn-sm btn-warning me-1">Edit</a>
            </td>

            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/delete/{id}(id=${p.id})}"
                   class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('Delete this product?')">
                    Delete
                </a>
            </td>

        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
