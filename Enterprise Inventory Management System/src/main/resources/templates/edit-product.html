<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/logs.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2>Edit Product</h2>

    <form th:action="@{/products/update}" method="post" th:object="${product}">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" th:field="*{category}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" th:field="*{price}" class="form-control" min="0" required>
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" th:field="*{quantity}" class="form-control" min="0" required>
        </div>

        <button type="submit" class="btn btn-success">Update</button>
        <a href="/products" class="btn btn-secondary">Cancel</a>

    </form>
</div>

</body>
</html>
