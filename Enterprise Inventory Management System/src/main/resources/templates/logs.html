<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Stock Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/logs.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Stock Logs</h2>

    <form method="get" action="/logs/filter" class="row g-2 mb-3 align-items-end" id="filterForm">


        <div class="col-auto">
            <select id="filterType" name="filterType" class="form-select form-select-sm" onchange="toggleInput()">
                <option value="">Select Filter</option>
                <option value="product">By Product ID</option>
                <option value="date">By Date</option>
            </select>
        </div>


        <div class="col-auto" id="inputBox">

        </div>


        <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm">Apply</button>
        </div>

    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Product ID</th>
            <th>Type</th>
            <th>Quantity</th>
            <th>Date</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="log : ${logs}">
            <td th:text="${log.productId}"></td>
            <td th:class="${log.changeType == 'ADD'} ? 'stock-in' : 'stock-out'"
                th:text="${log.changeType == 'ADD' ? '⬆ Added' : '⬇ Removed'}">
            </td>

            <td th:class="${log.changeType == 'ADD'} ? 'stock-in' : 'stock-out'"
                th:text="${log.changeType == 'ADD' ? '+ ' + log.quantityChanged : '- ' + log.quantityChanged}">
            </td>
            <td th:text="${#temporals.format(log.changeDate,'dd MMM yyyy HH:mm')}"></td>
        </tr>

        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary">Back</a>

</div>
<script src="/js/logs.js"></script>
</body>
</html>
