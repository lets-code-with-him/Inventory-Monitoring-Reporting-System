<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Inventory Dashboard</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>


<div class="sidebar">

    <div>

        <h3 class="logo">StockFlow</h3>

        <div class="menu">

            <a href="/dashboard">Dashboard</a>
            <a href="/products">Products</a>
            <a href="/low-stock">Low Stock</a>
            <a href="/logs">Stock Logs</a>
            <a href="/reports/export">Export CSV</a>
            <a href="/reports/logs/export">Export Logs CSV</a>

        </div>

    </div>


    <div class="bottom-section">

        <div class="username">
            <span th:text="${username}">Admin</span>
        </div>

        <a href="/logout" class="logout-btn">
            Logout
        </a>

    </div>

</div>


<div class="main-content">

    <h2 class="page-title">Inventory Dashboard</h2>

    <div th:if="${lowStockCount > 0}" class="alert alert-warning alert-dismissible fade show" role="alert">
        <strong>Warning!</strong>
        You have <span th:text="${lowStockCount}">0</span> product(s) low in stock.
        <a href="/low-stock" class="alert-link">Check now</a>.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>




    <div class="row g-4">

        <!-- TOTAL PRODUCTS -->
        <div class="col-md-4">

            <div class="card dashboard-card card-purple">

                <h5>Total Products</h5>

                <div class="card-value"
                     th:text="${totalProducts}">
                </div>

            </div>

        </div>


        <div class="col-md-4">

            <div class="card dashboard-card card-blue">

                <h5>Total Inventory Value</h5>

                <div class="card-value">
                    ₹ <span th:text="${totalInventoryValue}"></span>
                </div>

            </div>

        </div>


        <div class="col-md-4">

            <div class="card dashboard-card card-red">

                <h5>Low Stock Products</h5>

                <div class="card-value"
                     th:text="${lowStockCount}">
                </div>

            </div>

        </div>

    </div>


    <div class="row mt-5">

        <!-- BAR CHART -->
        <div class="col-md-8">
            <div class="card dashboard-card">
                <h5>Stock Quantity by Product</h5>
                <canvas id="barChart"></canvas>
            </div>
        </div>


        <div class="col-md-4">
            <div class="card dashboard-card">
                <h5>Stock Distribution</h5>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

    </div>

</div>

<script th:inline="javascript">
    var productNames = [[${productNames}]];
    var productQuantities = [[${productQuantities}]];

    var lowStock = [[${lowStock}]];
    var mediumStock = [[${mediumStock}]];
    var highStock = [[${highStock}]];
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/chart.js"></script>
</body>
</html>
